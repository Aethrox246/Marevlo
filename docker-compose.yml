services:

  postgres:
    image: postgres:15
    container_name: algosphere_postgres
    restart: always
    environment:
      POSTGRES_USER: algosphere
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: algosphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: algosphere_backend
    depends_on:
      - postgres
      - ide-api
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://algosphere:strongpassword@postgres:5432/algosphere_db
      IDE_API_URL: http://ide-api:4000
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@algosphere.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}

  ide-api:
    build: ./ide-services/api-server
    container_name: marevlo_ide_api
    ports:
      - "4000:4000"

  runner-cpp-image:
    build: ./runner-images/cpp
    image: algosphere-runner-cpp:latest
    command: ["true"]
    restart: "no"

  runner-java-image:
    build: ./runner-images/java
    image: algosphere-runner-java:latest
    command: ["true"]
    restart: "no"

  runner:
    build: ./ide-services/runner
    container_name: marevlo_runner
    depends_on:
      - runner-cpp-image
      - runner-java-image
    ports:
      - "4002:4002"
    environment:
      CPP_RUNNER_IMAGE: algosphere-runner-cpp:latest
      JAVA_RUNNER_IMAGE: algosphere-runner-java:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  jupyter:
    image: jupyter/minimal-notebook
    container_name: marevlo_jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ""
    command:
      - "start-notebook.sh"
      - "--NotebookApp.token="
      - "--NotebookApp.password="
      - "--NotebookApp.allow_origin=*"
      - "--NotebookApp.disable_check_xsrf=True"

  redis:
    image: redis:7
    container_name: marevlo_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
